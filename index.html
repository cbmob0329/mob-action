<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>横スクロール攻撃テスト 修正版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#111;color:#fff;font-family:system-ui}
#game{position:fixed;inset:0;width:100vw;height:100vh;touch-action:none}
#ui{position:fixed;left:10px;top:10px;z-index:10;background:rgba(0,0,0,.62);padding:10px 12px;border-radius:12px;font-size:12px;line-height:1.55;max-width:360px}
#controls{position:fixed;left:0;right:0;bottom:18px;z-index:20;display:flex;justify-content:space-between;padding:0 18px;pointer-events:none}
.pad,.btns{display:flex;gap:12px;pointer-events:auto}
.ctrl{width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:rgba(0,0,0,.45);color:white;font-weight:900}
.big{width:78px;height:78px}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui">
← → / A D：移動<br>
Space / ↑：ジャンプ<br>
J / ■：通常攻撃 3連撃<br>
K / ●：遠距離攻撃 / 長押し溜め<br>
※全モーションの表示サイズを固定化
</div>

<div id="controls">
  <div class="pad">
    <button class="ctrl" id="leftBtn">←</button>
    <button class="ctrl" id="rightBtn">→</button>
  </div>
  <div class="btns">
    <button class="ctrl big" id="jumpBtn">JUMP</button>
    <button class="ctrl big" id="atkBtn">■</button>
    <button class="ctrl big" id="shotBtn">●</button>
  </div>
</div>

<script>
'use strict';

const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=Math.floor(innerWidth*devicePixelRatio);
  canvas.height=Math.floor(innerHeight*devicePixelRatio);
  canvas.style.width=innerWidth+'px';
  canvas.style.height=innerHeight+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
addEventListener('resize',resize);
resize();

const ASSET={
  walk:'play/playhoko.png',
  atk1:'play/playatk.png',
  raigeki:'play/playraigeki.png',
  baraMotion:'play/playbara.png',
  charge:'play/playei1.png',
  thunderAtk:'ef/efraigekiatk.png',
  thunderGround:'ef/efraigeki.png',
  bara:'ef/efbara.png'
};

const imgs={};
function loadImage(key,src){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{imgs[key]=img;resolve();};
    img.onerror=()=>{console.warn('画像なし:',src);resolve();};
    img.src=src;
  });
}
function hasImg(k){return imgs[k]&&imgs[k].complete&&imgs[k].naturalWidth>0;}

const SPR={
  walk:{key:'walk',cols:2,rows:2,frames:4,fps:8},
  atk1:{key:'atk1',cols:2,rows:2,frames:4,fps:16},
  atk2:{key:'atk1',cols:2,rows:2,frames:4,fps:12},
  atk3:{key:'raigeki',cols:2,rows:2,frames:4,fps:10},
  baraMotion:{key:'baraMotion',cols:2,rows:2,frames:4,fps:12},
  charge:{key:'charge',cols:2,rows:2,frames:4,fps:8}
};

const keys={left:false,right:false,jump:false,attack:false,shot:false};
let atkWasDown=false;
let shotWasDown=false;

addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=true;
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W')keys.jump=true;
  if(e.key==='j'||e.key==='J')keys.attack=true;
  if(e.key==='k'||e.key==='K')keys.shot=true;
});
addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=false;
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W')keys.jump=false;
  if(e.key==='j'||e.key==='J')keys.attack=false;
  if(e.key==='k'||e.key==='K')keys.shot=false;
});
function bind(id,k){
  const b=document.getElementById(id);
  b.onpointerdown=e=>{e.preventDefault();keys[k]=true;b.setPointerCapture(e.pointerId);};
  b.onpointerup=e=>{e.preventDefault();keys[k]=false;};
  b.onpointercancel=()=>keys[k]=false;
  b.onpointerleave=()=>keys[k]=false;
}
bind('leftBtn','left');
bind('rightBtn','right');
bind('jumpBtn','jump');
bind('atkBtn','attack');
bind('shotBtn','shot');

const PLAYER_DRAW_W=170;
const PLAYER_DRAW_H=170;

const player={
  x:170,y:0,vx:0,vy:0,w:120,h:150,dir:1,onGround:false,
  state:'walk',
  frame:0,anim:0,

  action:'none', // none / normal / charge / shotCast
  combo:0,
  actionTime:0,
  actionTotal:0,
  comboWindow:999,
  hitDone:false,
  queuedCombo:false,

  charge:0,
  shotPower:0
};

const camera={x:0};
const worldW=3200;
const groundY=()=>innerHeight-110;

const enemies=[700,1120,1540,2050].map(x=>({
  x,y:0,w:90,h:120,hp:180,shock:0,flash:0,alive:true
}));

let effects=[];
let projectiles=[];

function frameRect(def,frame){
  const img=imgs[def.key];
  if(!img)return {sx:0,sy:0,sw:1,sh:1};
  const fw=img.width/def.cols;
  const fh=img.height/def.rows;
  const f=frame%def.frames;
  return {
    sx:(f%def.cols)*fw,
    sy:Math.floor(f/def.cols)*fh,
    sw:fw,
    sh:fh
  };
}

function currentDef(){
  if(player.action==='normal'){
    if(player.combo===1)return SPR.atk1;
    if(player.combo===2)return SPR.atk2;
    return SPR.atk3;
  }
  if(player.action==='charge')return SPR.charge;
  if(player.action==='shotCast')return SPR.baraMotion;
  return SPR.walk;
}

function resetAnim(){
  player.frame=0;
  player.anim=0;
}

function attackDuration(combo){
  if(combo===1)return .26;
  if(combo===2)return .34;
  return .58;
}

function startNormalAttack(){
  if(player.action==='charge'||player.action==='shotCast')return;

  if(player.action==='normal'){
    player.queuedCombo=true;
    return;
  }

  if(player.comboWindow>.55)player.combo=0;
  player.combo=(player.combo%3)+1;
  player.action='normal';
  player.actionTotal=attackDuration(player.combo);
  player.actionTime=player.actionTotal;
  player.hitDone=false;
  player.queuedCombo=false;
  resetAnim();
}

function startNextComboIfNeeded(){
  player.action='none';
  player.comboWindow=0;

  if(player.queuedCombo && player.combo<3){
    player.queuedCombo=false;
    startNormalAttack();
  }
}

function rectHit(a,b){
  return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

function normalHitbox(combo){
  const range=combo===1?155:(combo===2?200:245);
  return {
    x:player.dir>0?player.x+player.w*.55:player.x-range+player.w*.45,
    y:player.y+24,
    w:range,
    h:player.h*.7
  };
}

function applyNormalHit(){
  const c=player.combo;
  const hb=normalHitbox(c);
  enemies.forEach(e=>{
    if(!e.alive)return;
    if(rectHit(hb,e)){
      e.hp-=c===1?24:(c===2?42:58);
      e.flash=.14;
      if(c===2)e.shock=.45;
      if(c===3)e.shock=1.8;
      if(e.hp<=0)e.alive=false;
    }
  });
  if(c===3)spawnRaigekiEffects();
}

function spawnRaigekiEffects(){
  const baseX=player.x+player.w/2+player.dir*135;
  effects.push({type:'groundThunder',x:baseX,y:groundY()-22,t:.55,total:.55});
  effects.push({type:'thunderColumn',x:baseX-125,y:groundY()-360,t:.48,total:.48});
  effects.push({type:'thunderColumn',x:baseX+125,y:groundY()-360,t:.48,total:.48});

  const a1={x:baseX-185,y:groundY()-360,w:120,h:360};
  const a2={x:baseX+65,y:groundY()-360,w:120,h:360};
  enemies.forEach(e=>{
    if(!e.alive)return;
    if(rectHit(a1,e)||rectHit(a2,e)){
      e.hp-=70;
      e.shock=2.2;
      e.flash=.2;
      if(e.hp<=0)e.alive=false;
    }
  });
}

function startCharge(){
  if(player.action!=='none')return;
  player.action='charge';
  player.charge=0;
  resetAnim();
}

function releaseCharge(max=false){
  if(player.action!=='charge')return;
  if(max)player.charge=3;
  player.shotPower=Math.max(.15,Math.min(3,player.charge));
  player.action='shotCast';
  player.actionTotal=.42;
  player.actionTime=player.actionTotal;
  resetAnim();
}

function fireBara(power){
  const size=44+power*34;
  const speed=520+power*70;
  projectiles.push({
    type:'bara',
    x:player.dir>0?player.x+player.w+12:player.x-size-12,
    y:player.y+player.h*.42-size/2,
    w:size,h:size,
    vx:player.dir*speed,
    power,
    life:2.4,
    hit:false
  });
}

function explodeBara(x,y,power){
  const r=70+power*48;
  effects.push({type:'baraExplosion',x,y,r,t:.48,total:.48});
  const area={x:x-r,y:y-r,w:r*2,h:r*2};
  enemies.forEach(e=>{
    if(!e.alive)return;
    if(rectHit(area,e)){
      e.hp-=45+power*45;
      e.flash=.18;
      e.shock=.35+power*.25;
      if(e.hp<=0)e.alive=false;
    }
  });
}

function updateInput(){
  if(keys.attack&&!atkWasDown)startNormalAttack();
  atkWasDown=keys.attack;

  if(keys.shot&&!shotWasDown)startCharge();
  if(!keys.shot&&shotWasDown)releaseCharge(false);
  shotWasDown=keys.shot;
}

function updatePlayer(dt){
  updateInput();

  const locked=player.action==='normal'||player.action==='shotCast';
  let ix=0;
  if(keys.left)ix--;
  if(keys.right)ix++;

  if(!locked){
    if(ix){
      player.vx=ix*270;
      player.dir=ix>0?1:-1;
    }else{
      player.vx*=.82;
      if(Math.abs(player.vx)<5)player.vx=0;
    }
  }else{
    player.vx*=.72;
  }

  if(keys.jump&&player.onGround&&!locked){
    player.vy=-640;
    player.onGround=false;
  }

  if(player.action==='charge'){
    player.vx*=.72;
    player.charge+=dt;
    if(player.charge>=3)releaseCharge(true);
  }

  if(player.action==='normal'){
    player.actionTime-=dt;
    const progress=1-player.actionTime/player.actionTotal;
    if(!player.hitDone&&progress>=.42){
      player.hitDone=true;
      applyNormalHit();
    }
    if(player.actionTime<=0){
      player.actionTime=0;
      startNextComboIfNeeded();
    }
  }

  if(player.action==='shotCast'){
    player.actionTime-=dt;
    if(player.actionTime<=0){
      fireBara(player.shotPower);
      player.action='none';
      player.charge=0;
      player.shotPower=0;
    }
  }

  if(player.action==='none'){
    player.comboWindow+=dt;
  }

  player.vy+=1450*dt;
  player.x+=player.vx*dt;
  player.y+=player.vy*dt;

  const gy=groundY();
  if(player.y+player.h>=gy){
    player.y=gy-player.h;
    player.vy=0;
    player.onGround=true;
  }

  player.x=Math.max(40,Math.min(worldW-180,player.x));

  const def=currentDef();
  player.anim+=dt;
  if(player.anim>1/(def.fps||8)){
    player.anim=0;
    player.frame=(player.frame+1)%def.frames;
  }

  camera.x=Math.max(0,Math.min(worldW-innerWidth,player.x-innerWidth*.42));
}

function updateWorld(dt){
  enemies.forEach(e=>{
    e.y=groundY()-e.h;
    e.shock=Math.max(0,e.shock-dt);
    e.flash=Math.max(0,e.flash-dt);
  });

  projectiles.forEach(p=>{
    p.x+=p.vx*dt;
    p.life-=dt;
    enemies.forEach(e=>{
      if(!e.alive||p.hit)return;
      if(rectHit(p,e)){
        p.hit=true;
        explodeBara(p.x+p.w/2,p.y+p.h/2,p.power);
      }
    });
    if(p.life<=0&&!p.hit){
      p.hit=true;
      explodeBara(p.x+p.w/2,p.y+p.h/2,p.power*.7);
    }
  });
  projectiles=projectiles.filter(p=>!p.hit);

  effects.forEach(e=>e.t-=dt);
  effects=effects.filter(e=>e.t>0);
}

function drawBg(){
  const w=innerWidth,h=innerHeight,gx=-camera.x;
  const sky=ctx.createLinearGradient(0,0,0,h);
  sky.addColorStop(0,'#7dd3fc');
  sky.addColorStop(.55,'#dbeafe');
  sky.addColorStop(.56,'#84cc16');
  sky.addColorStop(1,'#365314');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,w,h);

  ctx.fillStyle='rgba(255,255,255,.65)';
  for(let i=0;i<8;i++){
    const x=(i*360+120+gx*.25)%(w+420)-220;
    const y=70+(i%3)*44;
    ctx.beginPath();
    ctx.ellipse(x,y,70,24,0,0,Math.PI*2);
    ctx.ellipse(x+48,y+8,48,18,0,0,Math.PI*2);
    ctx.ellipse(x-45,y+6,45,16,0,0,Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle='#4d7c0f';
  ctx.fillRect(gx,groundY(),worldW,110);
  ctx.fillStyle='#713f12';
  for(let x=0;x<worldW;x+=160)ctx.fillRect(gx+x,groundY()+20,110,18);
  ctx.fillStyle='#1f2937';
  for(let x=420;x<worldW;x+=520){
    ctx.fillRect(gx+x,groundY()-60,180,60);
    ctx.fillStyle='#374151';
    ctx.fillRect(gx+x+14,groundY()-90,152,34);
    ctx.fillStyle='#1f2937';
  }
}

function drawEnemies(){
  enemies.forEach(e=>{
    if(!e.alive)return;
    const x=e.x-camera.x,y=e.y;
    ctx.save();

    if(e.shock>0){
      ctx.translate((Math.random()-.5)*5,(Math.random()-.5)*4);
      ctx.strokeStyle='rgba(255,240,80,.95)';
      ctx.lineWidth=3;
      for(let i=0;i<5;i++){
        const px=x+12+Math.random()*(e.w-24);
        ctx.beginPath();
        ctx.moveTo(px,y+8);
        ctx.lineTo(px+12,y+35);
        ctx.lineTo(px-7,y+70);
        ctx.stroke();
      }
    }

    ctx.fillStyle=e.flash>0?'#fff36b':'#7f1d1d';
    ctx.fillRect(x,y,e.w,e.h);
    ctx.fillStyle='#111827';
    ctx.fillRect(x+19,y+24,16,16);
    ctx.fillRect(x+54,y+24,16,16);

    ctx.fillStyle='#000';
    ctx.fillRect(x,y-12,e.w,7);
    ctx.fillStyle='#22c55e';
    ctx.fillRect(x,y-12,e.w*Math.max(0,e.hp/180),7);
    ctx.restore();
  });
}

function drawSprite(def,x,y,w,h,dir){
  const img=imgs[def.key];
  if(!img){
    ctx.fillStyle='#111827';
    ctx.fillRect(x,y,w,h);
    return;
  }
  const f=frameRect(def,player.frame);
  ctx.save();
  if(dir<0){
    ctx.translate(x+w,y);
    ctx.scale(-1,1);
    ctx.drawImage(img,f.sx,f.sy,f.sw,f.sh,0,0,w,h);
  }else{
    ctx.drawImage(img,f.sx,f.sy,f.sw,f.sh,x,y,w,h);
  }
  ctx.restore();
}

function drawRedAfterImage(){
  if(player.action!=='normal'||player.combo!==2)return;
  const p=1-player.actionTime/player.actionTotal;
  const x=player.x-camera.x+player.w/2+player.dir*(45+p*45);
  const y=player.y+player.h*.48;
  ctx.save();
  ctx.globalAlpha=.45*(1-p);
  ctx.strokeStyle='rgba(255,30,50,.9)';
  ctx.lineWidth=18;
  ctx.beginPath();
  ctx.arc(x,y,55+p*44,player.dir>0?-1.1:Math.PI+1.1,player.dir>0?.8:Math.PI-.8);
  ctx.stroke();
  ctx.restore();
}

function drawChargeEnergy(){
  if(player.action!=='charge'&&player.action!=='shotCast')return;
  const power=player.action==='charge'?Math.max(.15,Math.min(3,player.charge)):player.shotPower;
  const s=40+power*36;
  const x=player.dir>0?player.x-camera.x+player.w+18:player.x-camera.x-s-18;
  const y=player.y+player.h*.43-s/2;

  ctx.save();
  if(hasImg('bara')){
    ctx.drawImage(imgs.bara,x,y,s,s);
  }else{
    const g=ctx.createRadialGradient(x+s/2,y+s/2,5,x+s/2,y+s/2,s/2);
    g.addColorStop(0,'#fff');
    g.addColorStop(.35,'#ff7adf');
    g.addColorStop(1,'rgba(180,0,80,.25)');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(x+s/2,y+s/2,s/2,0,Math.PI*2);
    ctx.fill();
  }
  ctx.strokeStyle='rgba(255,120,210,.85)';
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.arc(x+s/2,y+s/2,s/2+5*Math.sin(performance.now()/80),0,Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function drawPlayer(){
  drawRedAfterImage();

  const def=currentDef();
  const drawW=PLAYER_DRAW_W;
  const drawH=PLAYER_DRAW_H;
  const foot=player.y+player.h;
  const dx=player.x-camera.x+(player.w-drawW)/2;
  const dy=foot-drawH;

  drawSprite(def,dx,dy,drawW,drawH,player.dir);
  drawChargeEnergy();
}

function drawProjectiles(){
  projectiles.forEach(p=>{
    const x=p.x-camera.x,y=p.y;
    if(hasImg('bara')){
      ctx.drawImage(imgs.bara,x,y,p.w,p.h);
    }else{
      ctx.fillStyle='#ff4db8';
      ctx.beginPath();
      ctx.arc(x+p.w/2,y+p.h/2,p.w/2,0,Math.PI*2);
      ctx.fill();
    }
  });
}

function drawEffects(){
  effects.forEach(e=>{
    const a=Math.max(0,Math.min(1,e.t/e.total));
    const x=e.x-camera.x,y=e.y;
    ctx.save();
    ctx.globalAlpha=a;

    if(e.type==='thunderColumn'){
      if(hasImg('thunderAtk')){
        ctx.drawImage(imgs.thunderAtk,x-70,y,140,360);
      }else{
        ctx.strokeStyle='#fff36b';
        ctx.lineWidth=10;
        ctx.beginPath();
        ctx.moveTo(x,y);
        ctx.lineTo(x+28,y+90);
        ctx.lineTo(x-14,y+170);
        ctx.lineTo(x+42,y+260);
        ctx.lineTo(x,y+360);
        ctx.stroke();
      }
    }

    if(e.type==='groundThunder'){
      if(hasImg('thunderGround')){
        ctx.drawImage(imgs.thunderGround,x-170,y-95,340,120);
      }else{
        ctx.fillStyle='rgba(255,240,90,.55)';
        ctx.beginPath();
        ctx.ellipse(x,y,170,28,0,0,Math.PI*2);
        ctx.fill();
      }
    }

    if(e.type==='baraExplosion'){
      const p=1-e.t/e.total;
      const r=e.r*(.4+p*.8);
      const g=ctx.createRadialGradient(x,y,5,x,y,r);
      g.addColorStop(0,'#fff');
      g.addColorStop(.25,'#ff7adf');
      g.addColorStop(.65,'#fb7185');
      g.addColorStop(1,'rgba(180,0,80,0)');
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fill();
    }

    ctx.restore();
  });
}

let last=performance.now();
function loop(now){
  const dt=Math.min(.033,(now-last)/1000);
  last=now;
  updatePlayer(dt);
  updateWorld(dt);
  drawBg();
  drawEffects();
  drawEnemies();
  drawProjectiles();
  drawPlayer();
  requestAnimationFrame(loop);
}

Promise.all(Object.entries(ASSET).map(([k,v])=>loadImage(k,v))).then(()=>{
  player.y=groundY()-player.h;
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
