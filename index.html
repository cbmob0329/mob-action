<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>横スクロール攻撃 最新版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#111;color:#fff;font-family:system-ui}
#game{position:fixed;inset:0;width:100vw;height:100vh;touch-action:none}
#ui{position:fixed;left:10px;top:10px;z-index:10;background:rgba(0,0,0,.62);padding:10px 12px;border-radius:12px;font-size:12px;line-height:1.55;max-width:390px}
#controls{position:fixed;left:0;right:0;bottom:18px;z-index:20;display:flex;justify-content:space-between;padding:0 18px;pointer-events:none}
.pad,.btns{display:flex;gap:12px;pointer-events:auto}.ctrl{width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:rgba(0,0,0,.45);color:white;font-weight:900}.big{width:78px;height:78px}.ctrl:active{transform:scale(.94);background:rgba(255,255,255,.22)}
</style>
</head><body>
<canvas id="game"></canvas>
<div id="ui">← → / A D：移動<br>Space / ↑：ジャンプ<br>J / ■：通常攻撃 最大三連撃<br>K / ●：遠距離攻撃 / 長押し溜め<br>全スプライト：左上→右上→左下→右下</div>
<div id="controls"><div class="pad"><button class="ctrl" id="leftBtn">←</button><button class="ctrl" id="rightBtn">→</button></div><div class="btns"><button class="ctrl big" id="jumpBtn">JUMP</button><button class="ctrl big" id="atkBtn">■</button><button class="ctrl big" id="shotBtn">●</button></div></div>
<script>
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
function resize(){canvas.width=Math.floor(innerWidth*devicePixelRatio);canvas.height=Math.floor(innerHeight*devicePixelRatio);canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}addEventListener('resize',resize);resize();
const ASSET={walk:'play/playhoko.png',atk1:'play/playatk.png',atk2:'play/playatk2.png',raigeki:'play/playraigeki.png',baraMotion:'play/playbara.png',charge:'play/playei1.png',thunderAtk:'ef/efraigekiatk.png',thunderGround:'ef/efraigeki.png',bara:'ef/efbara.png'};
const imgs={};function loadImage(k,src){return new Promise(r=>{const img=new Image();img.onload=()=>{imgs[k]=img;r()};img.onerror=()=>{console.warn('画像なし:',src);r()};img.src=src})}
function frame4(img,frame){if(!img)return{sx:0,sy:0,sw:1,sh:1};const fw=img.width/2,fh=img.height/2,f=(Math.max(0,Math.min(3,Math.floor(frame)))%4);return{sx:(f%2)*fw,sy:Math.floor(f/2)*fh,sw:fw,sh:fh}}
function drawSheet4(key,frame,x,y,w,h,flip=false){const img=imgs[key];if(!img){ctx.fillStyle=key.includes('bara')?'#ff4db8':'#111827';if(key.includes('bara')){ctx.beginPath();ctx.arc(x+w/2,y+h/2,Math.min(w,h)/2,0,Math.PI*2);ctx.fill()}else ctx.fillRect(x,y,w,h);return}const f=frame4(img,frame);ctx.save();if(flip){ctx.translate(x+w,y);ctx.scale(-1,1);ctx.drawImage(img,f.sx,f.sy,f.sw,f.sh,0,0,w,h)}else ctx.drawImage(img,f.sx,f.sy,f.sw,f.sh,x,y,w,h);ctx.restore()}
const SPR={walk:{key:'walk',fps:8},atk1:{key:'atk1',fps:17},atk2:{key:'atk2',fps:12},atk3:{key:'raigeki',fps:10},baraMotion:{key:'baraMotion',fps:12},charge:{key:'charge',fps:8}};
const keys={left:false,right:false,jump:false,attack:false,shot:false};let atkWasDown=false,shotWasDown=false;
addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=true;if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=true;if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W')keys.jump=true;if(e.key==='j'||e.key==='J')keys.attack=true;if(e.key==='k'||e.key==='K')keys.shot=true});
addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=false;if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=false;if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W')keys.jump=false;if(e.key==='j'||e.key==='J')keys.attack=false;if(e.key==='k'||e.key==='K')keys.shot=false});
function bind(id,k){const b=document.getElementById(id);b.onpointerdown=e=>{e.preventDefault();keys[k]=true;b.setPointerCapture(e.pointerId)};b.onpointerup=e=>{e.preventDefault();keys[k]=false};b.onpointercancel=()=>keys[k]=false;b.onpointerleave=()=>keys[k]=false}bind('leftBtn','left');bind('rightBtn','right');bind('jumpBtn','jump');bind('atkBtn','attack');bind('shotBtn','shot');
const PLAYER_DRAW_W=170,PLAYER_DRAW_H=170;
const player={x:170,y:0,vx:0,vy:0,w:120,h:150,dir:1,onGround:false,frame:0,anim:0,action:'none',combo:0,actionTime:0,actionTotal:0,comboWindow:999,hitDone:false,queuedCombo:false,thunderSpawned:false,charge:0,shotPower:0,castFired:false,shakeTime:0};
const camera={x:0},worldW=3400,groundY=()=>innerHeight-110;
const enemies=[700,1120,1540,2050,2500].map(x=>({x,y:0,w:90,h:120,hp:180,shock:0,flash:0,alive:true}));let effects=[],projectiles=[];
function currentDef(){if(player.action==='normal'){if(player.combo===1)return SPR.atk1;if(player.combo===2)return SPR.atk2;return SPR.atk3}if(player.action==='charge')return SPR.charge;if(player.action==='shotCast')return SPR.baraMotion;return SPR.walk}function resetAnim(){player.frame=0;player.anim=0}function rectHit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function attackDuration(c){return c===1?.25:(c===2?.36:.64)}
function startNormalAttack(){if(player.action==='charge'||player.action==='shotCast'||player.action==='raigekiShake')return;if(player.action==='normal'){player.queuedCombo=true;return}if(player.comboWindow>.58)player.combo=0;player.combo=player.combo%3+1;player.action='normal';player.actionTotal=attackDuration(player.combo);player.actionTime=player.actionTotal;player.hitDone=false;player.queuedCombo=false;player.thunderSpawned=false;resetAnim()}
function finishNormalAttack(){if(player.combo===3){player.action='raigekiShake';player.shakeTime=.5;player.comboWindow=0;return}player.action='none';player.comboWindow=0;if(player.queuedCombo&&player.combo<3){player.queuedCombo=false;startNormalAttack()}}
function normalHitbox(c){const range=c===1?155:(c===2?205:250);return{x:player.dir>0?player.x+player.w*.55:player.x-range+player.w*.45,y:player.y+24,w:range,h:player.h*.7}}
function applyNormalHit(){const c=player.combo,hb=normalHitbox(c);enemies.forEach(e=>{if(!e.alive)return;if(rectHit(hb,e)){e.hp-=c===1?24:(c===2?44:58);e.flash=.14;if(c===3)e.shock=2;if(e.hp<=0)e.alive=false}})}
function spawnRaigekiEffects(){const bx=player.x+player.w/2+player.dir*135;effects.push({type:'thunderColumn',x:bx-125,y:groundY()-360,t:.56,total:.56,frame:0,anim:0,delay:0});effects.push({type:'thunderColumn',x:bx+125,y:groundY()-360,t:.56,total:.56,frame:0,anim:0,delay:.06});effects.push({type:'groundThunder',x:bx,y:groundY()-22,t:.62,total:.62,frame:0,anim:0,delay:0});const a1={x:bx-185,y:groundY()-360,w:120,h:360},a2={x:bx+65,y:groundY()-360,w:120,h:360};enemies.forEach(e=>{if(!e.alive)return;if(rectHit(a1,e)||rectHit(a2,e)){e.hp-=72;e.shock=2.2;e.flash=.2;if(e.hp<=0)e.alive=false}})}
function startCharge(){if(player.action!=='none')return;player.action='charge';player.charge=0;player.castFired=false;resetAnim()}function releaseCharge(max=false){if(player.action!=='charge')return;if(max)player.charge=3;player.shotPower=Math.max(.15,Math.min(3,player.charge));player.action='shotCast';player.actionTotal=.44;player.actionTime=player.actionTotal;player.castFired=false;resetAnim()}
function fireBara(power){const s=44+power*34,spd=520+power*70;projectiles.push({type:'bara',x:player.dir>0?player.x+player.w+12:player.x-s-12,y:player.y+player.h*.42-s/2,w:s,h:s,vx:player.dir*spd,power,life:2.4,anim:0,frame:0,hit:false})}
function explodeBara(x,y,power){const r=70+power*52;effects.push({type:'baraExplosion',x,y,r,t:.48,total:.48,frame:0,anim:0});const area={x:x-r,y:y-r,w:r*2,h:r*2};enemies.forEach(e=>{if(!e.alive)return;if(rectHit(area,e)){e.hp-=45+power*48;e.flash=.18;e.shock=.25+power*.2;if(e.hp<=0)e.alive=false}})}
function updateInput(){if(keys.attack&&!atkWasDown)startNormalAttack();atkWasDown=keys.attack;if(keys.shot&&!shotWasDown)startCharge();if(!keys.shot&&shotWasDown)releaseCharge(false);shotWasDown=keys.shot}
function updatePlayer(dt){updateInput();const locked=player.action==='normal'||player.action==='shotCast'||player.action==='raigekiShake';let ix=0;if(keys.left)ix--;if(keys.right)ix++;if(!locked){if(ix){player.vx=ix*270;player.dir=ix>0?1:-1}else{player.vx*=.82;if(Math.abs(player.vx)<5)player.vx=0}}else player.vx*=.72;if(keys.jump&&player.onGround&&!locked){player.vy=-640;player.onGround=false}if(player.action==='charge'){player.vx*=.72;player.charge+=dt;if(player.charge>=3)releaseCharge(true)}if(player.action==='normal'){player.actionTime-=dt;const p=1-player.actionTime/player.actionTotal;if(!player.hitDone&&p>=.42){player.hitDone=true;applyNormalHit()}if(player.combo===3&&!player.thunderSpawned&&p>=.82){player.thunderSpawned=true;spawnRaigekiEffects()}if(player.actionTime<=0){player.actionTime=0;finishNormalAttack()}}if(player.action==='raigekiShake'){player.shakeTime-=dt;if(player.shakeTime<=0){player.action='none';player.comboWindow=0;player.queuedCombo=false}}if(player.action==='shotCast'){player.actionTime-=dt;const p=1-player.actionTime/player.actionTotal;if(!player.castFired&&p>=.92){player.castFired=true;fireBara(player.shotPower||.35)}if(player.actionTime<=0){player.action='none';player.charge=0;player.shotPower=0;player.castFired=false}}if(player.action==='none')player.comboWindow+=dt;player.vy+=1450*dt;player.x+=player.vx*dt;player.y+=player.vy*dt;const gy=groundY();if(player.y+player.h>=gy){player.y=gy-player.h;player.vy=0;player.onGround=true}player.x=Math.max(40,Math.min(worldW-180,player.x));const d=currentDef();player.anim+=dt;if(player.anim>1/(d.fps||8)){player.anim=0;if(player.action==='raigekiShake')player.frame=3;else player.frame=(player.frame+1)%4}camera.x=Math.max(0,Math.min(worldW-innerWidth,player.x-innerWidth*.42))}
function updateWorld(dt){enemies.forEach(e=>{e.y=groundY()-e.h;e.shock=Math.max(0,e.shock-dt);e.flash=Math.max(0,e.flash-dt)});projectiles.forEach(p=>{p.x+=p.vx*dt;p.life-=dt;p.anim+=dt;if(p.anim>1/12){p.anim=0;p.frame=(p.frame+1)%4}enemies.forEach(e=>{if(!e.alive||p.hit)return;if(rectHit(p,e)){p.hit=true;explodeBara(p.x+p.w/2,p.y+p.h/2,p.power)}});if(p.life<=0&&!p.hit){p.hit=true;explodeBara(p.x+p.w/2,p.y+p.h/2,p.power*.7)}});projectiles=projectiles.filter(p=>!p.hit);effects.forEach(e=>{if(e.delay&&e.delay>0){e.delay-=dt;return}e.t-=dt;e.anim=(e.anim||0)+dt;if(e.anim>1/12){e.anim=0;e.frame=((e.frame||0)+1)%4}});effects=effects.filter(e=>(e.delay&&e.delay>0)||e.t>0)}
function drawBg(){const w=innerWidth,h=innerHeight,gx=-camera.x,sky=ctx.createLinearGradient(0,0,0,h);sky.addColorStop(0,'#7dd3fc');sky.addColorStop(.55,'#dbeafe');sky.addColorStop(.56,'#84cc16');sky.addColorStop(1,'#365314');ctx.fillStyle=sky;ctx.fillRect(0,0,w,h);ctx.fillStyle='rgba(255,255,255,.65)';for(let i=0;i<8;i++){const x=(i*360+120+gx*.25)%(w+420)-220,y=70+(i%3)*44;ctx.beginPath();ctx.ellipse(x,y,70,24,0,0,Math.PI*2);ctx.ellipse(x+48,y+8,48,18,0,0,Math.PI*2);ctx.ellipse(x-45,y+6,45,16,0,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#4d7c0f';ctx.fillRect(gx,groundY(),worldW,110);ctx.fillStyle='#713f12';for(let x=0;x<worldW;x+=160)ctx.fillRect(gx+x,groundY()+20,110,18);ctx.fillStyle='#1f2937';for(let x=420;x<worldW;x+=520){ctx.fillRect(gx+x,groundY()-60,180,60);ctx.fillStyle='#374151';ctx.fillRect(gx+x+14,groundY()-90,152,34);ctx.fillStyle='#1f2937'}}
function drawEnemies(){enemies.forEach(e=>{if(!e.alive)return;const x=e.x-camera.x,y=e.y;ctx.save();if(e.shock>0){ctx.translate((Math.random()-.5)*5,(Math.random()-.5)*4);ctx.strokeStyle='rgba(255,240,80,.95)';ctx.lineWidth=3;for(let i=0;i<5;i++){const px=x+12+Math.random()*(e.w-24);ctx.beginPath();ctx.moveTo(px,y+8);ctx.lineTo(px+12,y+35);ctx.lineTo(px-7,y+70);ctx.stroke()}}ctx.fillStyle=e.flash>0?'#fff36b':'#7f1d1d';ctx.fillRect(x,y,e.w,e.h);ctx.fillStyle='#111827';ctx.fillRect(x+19,y+24,16,16);ctx.fillRect(x+54,y+24,16,16);ctx.fillStyle='#000';ctx.fillRect(x,y-12,e.w,7);ctx.fillStyle='#22c55e';ctx.fillRect(x,y-12,e.w*Math.max(0,e.hp/180),7);ctx.restore()})}
function drawRedAfterImage(){if(player.action!=='normal'||player.combo!==2)return;const p=1-player.actionTime/player.actionTotal,x=player.x-camera.x+player.w/2+player.dir*(45+p*45),y=player.y+player.h*.48;ctx.save();ctx.globalAlpha=.45*(1-p);ctx.strokeStyle='rgba(255,30,50,.9)';ctx.lineWidth=18;ctx.beginPath();ctx.arc(x,y,55+p*44,player.dir>0?-1.1:Math.PI+1.1,player.dir>0?.8:Math.PI-.8);ctx.stroke();ctx.restore()}
function drawChargeEnergy(){if(player.action!=='charge'&&player.action!=='shotCast')return;const power=player.action==='charge'?Math.max(.15,Math.min(3,player.charge)):player.shotPower,s=40+power*36,x=player.dir>0?player.x-camera.x+player.w+18:player.x-camera.x-s-18,y=player.y+player.h*.43-s/2,spin=Math.floor(performance.now()/45)%4;ctx.save();drawSheet4('bara',spin,x,y,s,s);ctx.strokeStyle='rgba(255,120,210,.85)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(x+s/2,y+s/2,s/2+5*Math.sin(performance.now()/80),0,Math.PI*2);ctx.stroke();ctx.restore()}
function drawPlayer(){drawRedAfterImage();const d=currentDef();let f=player.frame;if(player.action==='raigekiShake')f=3;const foot=player.y+player.h;let dx=player.x-camera.x+(player.w-PLAYER_DRAW_W)/2,dy=foot-PLAYER_DRAW_H;if(player.action==='raigekiShake'){dx+=(Math.random()-.5)*5;dy+=(Math.random()-.5)*3}drawSheet4(d.key,f,dx,dy,PLAYER_DRAW_W,PLAYER_DRAW_H,player.dir<0);drawChargeEnergy()}
function drawProjectiles(){projectiles.forEach(p=>drawSheet4('bara',p.frame||0,p.x-camera.x,p.y,p.w,p.h))}
function drawEffects(){effects.forEach(e=>{if(e.delay&&e.delay>0)return;const a=Math.max(0,Math.min(1,e.t/e.total)),x=e.x-camera.x,y=e.y;ctx.save();ctx.globalAlpha=a;if(e.type==='thunderColumn')drawSheet4('thunderAtk',e.frame||0,x-70,y,140,360);if(e.type==='groundThunder')drawSheet4('thunderGround',e.frame||0,x-170,y-95,340,120);if(e.type==='baraExplosion'){const p=1-e.t/e.total,r=e.r*(.4+p*.8),g=ctx.createRadialGradient(x,y,5,x,y,r);g.addColorStop(0,'#fff');g.addColorStop(.25,'#ff7adf');g.addColorStop(.65,'#fb7185');g.addColorStop(1,'rgba(180,0,80,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}ctx.restore()})}
let last=performance.now();function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;updatePlayer(dt);updateWorld(dt);drawBg();drawEffects();drawEnemies();drawProjectiles();drawPlayer();requestAnimationFrame(loop)}
Promise.all(Object.entries(ASSET).map(([k,v])=>loadImage(k,v))).then(()=>{player.y=groundY()-player.h;requestAnimationFrame(loop)});
</script></body></html>
